<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STOC Advisory | U.S. Medical Aesthetics Market Report 2026 — Page 01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>


a { color: inherit; text-decoration: none; }

:root {
  --navy:  #0D1B2F;
  --white: #FFFFFF;
  --black: #111111;
  --dark:  #222222;
  --mid:   #555555;
  --gray:  #888888;
  --rule:  #CCCCCC;
  --bg:    #DEDAD4;
  --pw: 794px;
  --ph: 1123px;
}

body {
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  padding: 48px 0 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
}

.page {
  width: var(--pw);
  height: var(--ph);
  background: var(--white);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 28px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
}


/* ═══════════════════════════════════════════
   PAGE 1 COVER
   Bain exactly:
   - White page
   - Logo top-left on white, ~32px from top/left
   - Photo INSET with ~32px side margins, starts below logo area
   - Horizontal stripes on LEFT and RIGHT of photo
   - Large color band at bottom (~35% of page)
   - White bold title on the band, left-aligned
   ═══════════════════════════════════════════ */
.cover {
  height: var(--ph);
  background: var(--white);
  position: relative;
}

/* Logo sits on white space above photo */
.cv-logo-area {
  position: absolute;
  top: 30px;
  left: 36px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
}
.cv-logo-box {
  width: 80px;
  height: 44px;
  background: #f0f0f0;
  border: 1px dashed #bbb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 1px;
  color: #999;
  text-transform: uppercase;
}

/* Photo block inset with side margins, top just below logo area.
   Bottom edge sits DIRECTLY on top of the navy band zero gap. */
.cv-photo-wrap {
  position: absolute;
  top: 105px;
  left: 32px;
  right: 32px;
  bottom: 468px;   /* actual band height 436px + 32px white gap = balanced margins */
  overflow: hidden;
}

/* Horizontal stripes on LEFT and RIGHT outside edges of photo */
.cv-stripes-left {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.cv-stripes-left::before {
  content: '';
  position: absolute;
  top: 0; left: -22px; bottom: 0;
  width: 20px;
  background: repeating-linear-gradient(
    to bottom,
    var(--navy) 0px,
    var(--navy) 4px,
    transparent 4px,
    transparent 10px
  );
  opacity: 0.9;
}
.cv-stripes-left::after {
  content: '';
  position: absolute;
  top: 0; right: -22px; bottom: 0;
  width: 20px;
  background: repeating-linear-gradient(
    to bottom,
    var(--navy) 0px,
    var(--navy) 4px,
    transparent 4px,
    transparent 10px
  );
  opacity: 0.9;
}

/* Navy band fixed height at bottom, title at TOP of band */
.cv-band {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 360px;
  background: var(--navy);
  padding: 40px 44px 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Title sits at the top of the band matches Bain exactly */
.cv-band-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 50px;
  font-weight: 800;
  line-height: 1.05;
  color: var(--white);
  letter-spacing: -0.5px;
  max-width: 640px;
}

.cv-band-meta {
  border-top: 1px solid rgba(255,255,255,0.18);
  padding-top: 16px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.cv-band-byline {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.40);
  line-height: 1.7;
}
.cv-band-byline strong {
  display: block;
  font-weight: 600;
  color: rgba(255,255,255,0.65);
  margin-bottom: 2px;
}
.cv-band-year {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px;
  font-weight: 300;
  color: rgba(255,255,255,0.10);
  letter-spacing: 3px;
}


/* ═══════════════════════════════════════════
   PAGE 2 DISCLAIMER
   Bain exactly:
   - No logo, completely blank white top 2/3
   - One paragraph block near bottom
   - Copyright line below
   ═══════════════════════════════════════════ */
.disc-page {
  flex: 1;
  padding: 0 68px 60px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

.disc-body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 400;
  color: #444;
  line-height: 1.75;
  max-width: 630px;
  margin-bottom: 28px;
}

.disc-copy {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: #666;
}


/* ═══════════════════════════════════════════
   SHARED RUNNING HEADER
   Bain exactly:
   - Centered logo/brand name in red small-caps bold
   - Full-width hairline rule below
   - Centered doc title in gray below rule
   ═══════════════════════════════════════════ */
.pg-hdr {
  flex-shrink: 0;
  padding: 16px 44px 10px;
  text-align: center;
  position: relative;
}
.pgh-brand-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 8px;
}
.pgh-logo-box {
  width: 22px;
  height: 22px;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5px;
  font-weight: 700;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.3;
}
.pgh-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--navy);
}
.pgh-doc {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 400;
  color: var(--gray);
  letter-spacing: 0.2px;
}

/* PAGE FOOTER centered page number like Bain */
.pg-ftr {
  flex-shrink: 0;
  text-align: center;
  padding: 14px 0 16px;
  border-top: none;
  display: flex;
  justify-content: center;
  align-items: center;
}
.pg-ftr span {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: var(--gray);
}
.pgf-text { display: none !important; }
.pgf-num {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: #BBB;
}


/* ═══════════════════════════════════════════
   PAGE 3 ABOUT STOC + CDS
   ═══════════════════════════════════════════ */
.p3-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* ── About section ── */
.about-sec {
  padding: 32px 44px 28px;
  border-bottom: 2px solid var(--black);
}

/*
   SECTION HEADING this is the "About STOC Advisory" label.
   Making it large, bold, fully readable NOT small caps, NOT faded.
   Bain uses bold black headings for section titles on content pages.
*/
.sec-heading {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--black);
  letter-spacing: -0.2px;
  margin-bottom: 14px;
  line-height: 1.1;
}

.sec-subhead {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.45;
  max-width: 600px;
  margin-bottom: 13px;
}

.body-p {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--dark);
  line-height: 1.72;
  max-width: 690px;
}

/* Mission / Vision */
.mv-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  margin: 18px 0 20px;
}
.mv-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--black);
  margin-bottom: 5px;
}
.mv-body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10.5px;
  font-weight: 400;
  color: var(--mid);
  line-height: 1.65;
}

/* Values row */
.vals {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.val { background: var(--navy); padding: 12px 14px; }
.val-t {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11.5px;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 4px;
}
.val-b {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.50);
  line-height: 1.5;
}

/* ── CDS section ── */
.cds-sec {
  padding: 24px 44px 0;
  flex: 1;
}

/* CDS heading same bold treatment */
.cds-heading {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--black);
  letter-spacing: -0.2px;
  margin-bottom: 10px;
  line-height: 1.1;
}

.cds-subhead {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--dark);
  line-height: 1.4;
  max-width: 540px;
  margin-bottom: 10px;
}

.cds-intro {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--dark);
  line-height: 1.72;
  max-width: 690px;
  margin-bottom: 18px;
}

/* 2×3 grid */
.deliv-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 2px solid var(--black);
  border-left: 1px solid var(--rule);
}
.deliv {
  padding: 13px 15px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.deliv-n {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 4px;
}
.deliv-t {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.3;
  margin-bottom: 3px;
}
.deliv-b {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  color: var(--mid);
  line-height: 1.5;
}


/* ═══════════════════════════════════════════
   PAGE 4 TABLE OF CONTENTS
   Bain exactly:
   - "Contents" in navy bold ~36px, left-aligned
   - NO group headers, just entries
   - Plain dot-leader rows
   - Page number centered at bottom
   ═══════════════════════════════════════════ */
.toc-body {
  padding: 36px 44px 0;
  flex: 1;
}

/* "Contents" in navy bold matching Bain's red bold */
.toc-h {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -0.5px;
  margin-bottom: 28px;
  line-height: 1;
}

/* Entry rows Bain has generous spacing, plain text, dot leaders */
.toc-row {
  display: flex;
  align-items: baseline;
  padding: 11px 0;
  border-bottom: none;
}

.tr-title {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--black);
  flex: 1;
  padding-right: 12px;
  line-height: 1.3;
}

.tr-dots {
  flex: 1;
  border-bottom: 1px dotted #BBBBBB;
  margin: 0 6px;
  position: relative;
  top: -3px;
}

.tr-pg {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--black);
  width: 20px;
  text-align: right;
  flex-shrink: 0;
}

/* Section group label inside TOC minimal, just a spacer line */
.toc-grp-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #AAA;
  padding: 18px 0 8px;
}



/* Print: A4 page, centered, no spacing */
@page {
  size: A4;
  margin: 0;
}
html, body {
  margin: 0;
  padding: 0;
  background: #FFFFFF;
  width: 100%;
  height: 100%;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.page {
  width: 210mm;
  height: 297mm;
  margin: 0;
  padding: 0;
  box-shadow: none;
  flex-shrink: 0;
}

</style>
</head>
<body>
<div class="page" style="display:block; position:relative; height:var(--ph);">
<div class="cover">

  <!-- Logo on white space above photo -->
  <div class="cv-logo-area" style="min-height:44px;">
    <img src="stoc-logo.png" style="height:44px; width:auto; display:block;">
  </div>

  <!-- Inset photo with stripes on both sides -->
  <div class="cv-photo-wrap" style="background:#1B3550;">
    <img src="cover-photo.jpg" style="width:100%; height:100%; object-fit:cover; display:block;">
    <div class="cv-stripes-left"></div>
  </div>

  <!-- Navy band at bottom with title -->
  <div class="cv-band">
    <div class="cv-band-title">U.S. Medical Aesthetics<br>Market Report 2026</div>
    <div class="cv-band-meta">
      <div class="cv-band-byline">
        <strong>STOC Advisory &nbsp;&middot;&nbsp; Corporate Development Support</strong>
        Baltimore, MD &nbsp;&middot;&nbsp; Minneapolis, MN &nbsp;&middot;&nbsp; Nashville, TN &nbsp;&middot;&nbsp; Dallas, TX
      </div>
      <div class="cv-band-year">2026</div>
    </div>
  </div>

</div>
</div>
</body>
</html>
